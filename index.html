<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quantica Firmware Updater</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-1: #c0bcbc;
            --bg-2: #c3ced8;
            --ink: #212121;
            --muted: #3e3b3b;
            --accent: #009bff;
            --accent-2: #022cff;
            --warn: #b35a16;
            --error: #9e1f1f;
            --card: rgba(255, 255, 255, 0.42);
            --card-active: rgba(255, 255, 255, 0.9);
            --line: rgba(53, 53, 53, 0.36);
            --mono: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
            --sans: "Poppins", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--sans);
            color: var(--ink);
            background: url('0034.png') no-repeat center center fixed;
            background-size: cover;
        }

        .wrap {
            width: min(920px, 92vw);
            margin: 40px auto;
            display: grid;
            gap: 16px;
            animation: rise 360ms ease-out;
        }

        .card {
            background: var(--card);
            /* border: 1px solid var(--line); */
            border-radius: 16px;
            backdrop-filter: blur(6px);
            /* box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2), */
            /* Outer shadow */
            /* inset 0 4px 20px rgba(255, 255, 255, 0.3); */
            /* Inner glow */
            padding: 20px;

            &.active {
                background: var(--card-active);
                border: 2px solid rgb(117, 117, 117, 1);
            }
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            letter-spacing: 0.02em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.4;
        }

        .grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(12, minmax(0, 1fr));
        }

        .span-12 {
            grid-column: span 12;
        }

        .span-8 {
            grid-column: span 8;
        }

        .span-6 {
            grid-column: span 6;
        }

        .span-4 {
            grid-column: span 4;
        }

        @media (max-width: 820px) {

            .span-8,
            .span-6,
            .span-4 {
                grid-column: span 12;
            }
        }

        label {
            display: inline-block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 0.96rem;
            padding: 10px 12px;
            color: var(--ink);
            background: var(--bg-2);
        }

        .stack {
            display: grid;
            gap: 10px;
        }

        [hidden] {
            display: none !important;
        }

        .inline {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        input[type="file"]::file-selector-button,
        button {
            font-size: 0.9rem;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            padding: 10px 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 120ms ease, background-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0px 0px 7px 0px rgb(255 255 255 / 12%);
        }

        button.secondary {
            background: #2c3134;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.88rem;
            background: var(--bg-2);
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #777;
        }

        .dot.connected {
            background: #1d9b58;
        }

        .progress {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.72);
        }

        .progress>div {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #b44f15, #f66f1F);
            transition: width 180ms linear;
        }

        #statusText {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 8px;
            min-height: 1.2em;
        }

        #statusText.warn {
            color: var(--warn);
        }

        #statusText.error {
            color: var(--error);
        }

        #log {
            margin: 0;
            min-height: 180px;
            max-height: 320px;
            overflow: auto;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: var(--bg-2);
            font-family: var(--mono);
            font-size: 0.84rem;
            line-height: 1.45;
            white-space: pre-wrap;
            margin-top: 10px;
        }

        .small {
            font-size: 0.84rem;
            color: var(--muted);
        }

        .source-tabs {
            display: inline-flex;
            align-items: center;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: var(--bg-2);
            gap: 4px;
            width: fit-content;
        }

        .source-tabs input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .source-tab {
            margin: 0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: background-color 120ms ease, color 120ms ease;
        }

        .source-tabs input[type="radio"]:checked+.source-tab {
            color: #fff;
            background: var(--accent);
            border: 1px solid var(--line);
        }

        .source-tabs input[type="radio"]:focus-visible+.source-tab {
            outline: 2px solid color-mix(in srgb, var(--accent) 75%, #ffffff 25%);
            outline-offset: 2px;
        }

        .source-content {
            margin-top: 10px;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="card stack">
            <h1>Quântica Firmware Updater</h1>
            <p>Connect your module via USB, pick the latest firmware or upload your own binary, then flash over
                DFU.</p>
        </section>

        <section class="card grid active" id="deviceSection">
            <div class="span-8 stack">
                <div class="inline">
                    <button id="connectBtn" type="button">Connect</button>
                    <button id="disconnectBtn" type="button" class="secondary" disabled>Disconnect</button>
                    <span class="pill"><span id="deviceDot" class="dot"></span><span id="deviceLabel">No device
                            connected</span></span>
                </div>
                <!-- <p class="small">Tip: if your board is in runtime mode, switch it to DFU mode before flashing.</p> -->
            </div>
        </section>

        <section class="card grid" id="firmwareSection">
            <div class="span-12 stack">
                <label>Firmware source</label>
                <div class="source-tabs" role="tablist" aria-label="Firmware source">
                    <input id="sourceModeLatest" type="radio" name="sourceMode" value="latest" checked />
                    <label class="source-tab" for="sourceModeLatest">Latest firmware</label>

                    <input id="sourceModeCustom" type="radio" name="sourceMode" value="custom" />
                    <label class="source-tab" for="sourceModeCustom">Upload custom file</label>
                </div>

                <div class="source-content">
                    <div id="latestSourceGroup" class="stack">
                        <label for="latestChannel">Channel</label>
                        <select id="latestChannel"></select>
                    </div>

                    <input id="latestUrl" type="hidden" placeholder="https://example.com/firmware/latest.bin" />

                    <div id="customSourceGroup" class="stack" hidden>
                        <label for="customFile">Firmware binary file (.bin)</label>
                        <input id="customFile" type="file" accept=".bin,application/octet-stream" />
                        <p class="small">Hacking your own firmware onto Quântica? That's awesome, please see the
                            "Hacking"
                            section of the <a href="#">manual</a> for some hints.</p>
                    </div>
                </div>
            </div>

            <div class="span-12 inline">
                <button id="flashBtn" type="button" disabled>Begin Update</button>
            </div>
        </section>

        <section class="card stack" id="progressBarSection">
            <div class="progress" aria-label="Flash progress">
                <div id="progressBar"></div>
            </div>
            <div id="statusText">Idle</div>
            <details>
                <summary class="small">log</summary>
                <pre id="log"></pre>
            </details>
        </section>
    </main>

    <script type="importmap">
	{
		"imports": {
			"dfu": "./node_modules/dfu/dist/index.js",
			"nanoevents": "./node_modules/nanoevents/index.js"
		}
	}
	</script>
    <script type="module" src="./updater.js"></script>
</body>

</html>
